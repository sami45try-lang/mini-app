<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADE PLUG - Official Shop</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; color: #333; }
        header { background-color: #333; color: white; padding: 10px; text-align: center; }
        .logo { max-width: 150px; }
        nav { display: flex; justify-content: space-around; background-color: #444; padding: 10px; color: white; }
        nav a { color: white; text-decoration: none; font-weight: bold; }
        .container { padding: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background-color: white; border: 1px solid #ddd; padding: 15px; text-align: center; border-radius: 5px; }
        .product-image { max-width: 100%; height: 150px; object-fit: cover; }
        .product-price { font-weight: bold; color: green; font-size: 1.2em; }
        .add-to-cart { background-color: green; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .cart-icon { position: fixed; bottom: 20px; right: 20px; background-color: green; color: white; border-radius: 50%; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; font-size: 2em; cursor: pointer; }
        .cart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; }
        .cart-content { background-color: white; width: 80%; max-width: 600px; margin: 50px auto; padding: 20px; border-radius: 5px; }
        .cart-close { float: right; cursor: pointer; font-size: 1.5em; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .cart-item-info { display: flex; align-items: center; }
        .cart-item-image { width: 50px; height: 50px; object-fit: cover; margin-right: 10px; }
        .quantity-control { display: flex; align-items: center; }
        .quantity-control button { border: 1px solid #ddd; background-color: #f9f9f9; padding: 5px 10px; cursor: pointer; }
        .total-price { font-weight: bold; text-align: right; font-size: 1.2em; margin-top: 20px; }
        .checkout-button { background-color: green; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; display: block; width: 100%; text-align: center; margin-top: 20px; text-decoration: none;}
        .language-selector { text-align: center; margin-top: 10px; }
        .language-selector select { padding: 5px; }
        .policy-section { margin-top: 40px; border-top: 2px solid #ddd; padding-top: 20px; }
    </style>
</head>
<body>

<header>
    <!-- REPLACE WITH YOUR LOGO LINK -->
    <img src="https://res.cloudinary.com/demo/image/upload/v1312461204/sample.jpg" alt="SHADE PLUG Logo" class="logo">
    <h1>SHADE PLUG</h1>
</header>

<nav>
    <a href="#products">Products</a>
    <a href="#policies">Policies</a>
    <a href="https://t.me/shadeplug" target="_blank">Contact</a>
</nav>

<div class="language-selector">
    <label for="lang">Language:</label>
    <select id="lang" onchange="changeLanguage()">
        <option value="en">English</option>
        <option value="it">Italiano</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="cs">Čeština</option>
        <option value="ru">Русский</option>
    </select>
</div>

<div class="container">
    <div id="products" class="product-grid">
        <!-- Products will be generated here by JavaScript -->
    </div>

    <div id="policies" class="policy-section">
        <h2 id="policy-title">Terms & Conditions (T.O.S)</h2>
        <div id="policy-content">
            <!-- English policy will be here by default -->
        </div>
    </div>
</div>

<div class="cart-icon" onclick="openCart()">
    🛒 <span id="cart-count">0</span>
</div>

<div id="cart-modal" class="cart-modal">
    <div class="cart-content">
        <span class="cart-close" onclick="closeCart()">×</span>
        <h2>Your Cart</h2>
        <div id="cart-items">
            <!-- Cart items will be generated here -->
        </div>
        <div class="total-price">Total: €<span id="cart-total">0.00</span></div>
        <a href="#" class="checkout-button" onclick="checkout()">Proceed to Checkout (Simulation)</a>
    </div>
</div>

<script>
    // Product data (prices include 20% increase)
    const products = [
        { id: 1, name: "Cali Cryo 🌿", price: 2100.00, image: "https://i.imgur.com/XZHzDvT.png", weights: [500, 1000, 5000] },
        { id: 2, name: "Cali Sour Lifter 🌿", price: 420.00, image: "https://i.imgur.com/OEMJfOK.png", weights: [100, 200, 500, 1000] },
        { id: 3, name: "Cali Sweet Burger 🌿", price: 480.00, image: "https://i.imgur.com/q3bnCcp.png", weights: [100, 300, 500, 1000] },
        { id: 4, name: "Cali Gelato 🌿", price: 2400.00, image: "https://i.imgur.com/fq1uFFm.png", weights: [1000] },
        { id: 5, name: "Dry Frozen Sift top 🍫", price: 420.00, image: "https://i.imgur.com/rxOoCaf.png", weights: [50, 100, 250, 500, 1000] },
        { id: 6, name: "Cali Lemon Pop 🌿", price: 150.00, image: "https://i.imgur.com/fxzTmBs.png", weights: [25, 50, 100, 250, 500, 1000] },
        { id: 7, name: "Cali Spain Amnesia 🌿", price: 180.00, image: "https://i.imgur.com/XZHzDvT.png", weights: [25, 50, 100, 250, 500, 1000] },
        { id: 8, name: "MC kennaiii 🍄", price: 72.00, image: "https://i.imgur.com/q3bnCcp.png", weights: [5, 10] },
        { id: 9, name: "Dry Mimosa 🍫", price: 456.00, image: "https://i.imgur.com/IAqqE9h.png", weights: [100, 200, 500, 1000] },
        { id: 10, name: "Vape thc 🚬", price: 300.00, image: "https://i.imgur.com/IAqqE9h.png", weights: [10, 50, 100] }, // Using a placeholder for Vape
        { id: 11, name: "Cali Purple USA🌿", price: 224.40, image: "https://i.imgur.com/LMxU4R1.png", weights: [25, 50, 100, 250, 500, 1000] },
        { id: 12, name: "Cali Critical Berry 🌿", price: 150.00, image: "https://i.imgur.com/XZHzDvT.png", weights: [25, 50, 100, 250, 500, 1000] },
        { id: 13, name: "Cali Cherry🌿", price: 1440.00, image: "https://i.imgur.com/XZHzDvT.png", weights: [500, 1000, 5000] },
        { id: 14, name: "Dry 🍫", price: 3480.00, image: "https://i.imgur.com/XZHzDvT.png", weights: [1000] },
        { id: 15, name: "Cali Fruit Joy🌿", price: 1800.00, image: "https://i.imgur.com/XZHzDvT.png", weights: [500, 1000, 5000] },
        { id: 16, name: "Dry frozen top 🍫", price: 3960.00, image: "https://i.imgur.com/XZHzDvT.png", weights: [1000] },
        { id: 17, name: "Cali Spain Mimosa 🌿", price: 194.40, image: "https://i.imgur.com/XZHzDvT.png", weights: [25, 50, 100, 250, 500, 1000] },
        { id: 18, name: "Dry Biscotti Spagna🍫", price: 150.00, image: "https://i.imgur.com/z4v3zJ2.png", weights: [25, 50, 100, 250, 500, 1000] },
    ];

    let cart = [];

    // T.O.S Policies in English
    const policy = {
        title: { en: "Terms & Conditions (T.O.S)", it: "Termini e Condizioni (T.O.S)" },
        content: {
            en: `
<h3>🏆 SHADEPLUG SHOP - Terms of Purchase</h3>
<p>By placing an order, you automatically accept our terms and conditions.</p>
<ul>
    <li>Only verified escrows are accepted.</li>
    <li>If you wish to use escrow, a 10% fee will be added to the total.</li>
    <li>Payment is required in advance. Tracking is provided within 48 hours after payment confirmation.</li>
    <li>Shipping takes 24-48h within Europe, and up to 72h outside Europe.</li>
    <li>Fill out the shipping form completely and accurately.</li>
    <li>You have 6 hours to collect the package from the locker/point once delivered. After that, the payment will be released.</li>
    <li>You have 3 hours to confirm the content of the package after collection.</li>
</ul>
<h4>⚠️ Video Recording for Reship Policy</h4>
<p>To qualify for a reshipment, you must record an unedited video following these steps:</p>
<ol>
    <li>Start recording before opening the locker, showing all sides are closed.</li>
    <li>Collect the package, show all sides, and shake it to prove there is content.</li>
    <li>Open the package and show the content.</li>
</ol>
<p>Any video editing, cuts, or tampering will invalidate the reship policy.</p>
<h4>📦 Lost Package Policy</h4>
<ul>
    <li>0% reship if the package is stopped at the Bentivoglio "inpost" point.</li>
    <li>Reshipment will be made if the package is lost or seized due to an issue not caused by the buyer (except the point above).</li>
    <li>No reshipment if the package is lost due to incorrect shipping details, failure to collect, or similar buyer issues.</li>
</ul>
<h3>💳 Accepted Payment Methods</h3>
<ul>
    <li>BTC / LTC (0% fee)</li>
    <li>Revolut (+10% fee)</li>
    <li>PayPal (+10% fee)</li>
    <li>Escrow available (+10% fee)</li>
</ul>
            `,
            it: `
<h3>🏆 SHADEPLUG SHOP - Termini d'Acquisto</h3>
<p>Effettuando un ordine, accetti automaticamente i nostri termini e condizioni.</p>
<ul>
    <li>Si accettano solo escrow verificati.</li>
    <li>Se si desidera utilizzare l'escrow, verrà aggiunta una commissione del 10% al totale.</li>
    <li>Il pagamento è richiesto in anticipo. Il tracciamento viene fornito entro 48 ore dalla conferma del pagamento.</li>
    <li>La spedizione richiede 24-48 ore in Europa e fino a 72 ore fuori Europa.</li>
    <li>Compila il modulo di spedizione in modo completo e accurato.</li>
    <li>Hai 6 ore per ritirare il pacco dal locker/point una volta consegnato. Successivamente, il pagamento verrà sbloccato.</li>
    <li>Hai 3 ore per confermare il contenuto del pacco dopo il ritiro.</li>
</ul>
<h4>⚠️ Politica di Registrazione Video per il Reship</h4>
<p>Per avere diritto a una rispedizione, è necessario registrare un video non modificato seguendo questi passaggi:</p>
<ol>
    <li>Inizia la registrazione prima di aprire il locker, mostrando che tutti i lati sono chiusi.</li>
    <li>Ritira il pacco, mostra tutti i lati e scuotilo per dimostrare che c'è contenuto.</li>
    <li>Apri il pacco e mostra il contenuto.</li>
</ol>
<p>Qualsiasi modifica video, taglio o manomissione annullerà la politica di reship.</p>
<h4>📦 Politica Pacco Smarrito</h4>
<ul>
    <li>0% reship se il pacco viene fermato al punto "inpost" di Bentivoglio.</li>
    <li>La rispedizione verrà effettuata se il pacco viene smarrito o sequestrato a causa di un problema non causato dall'acquirente (eccetto il punto sopra).</li>
    <li>Nessuna rispedizione se il pacco viene smarrito a causa di dettagli di spedizione errati, mancato ritiro o problemi simili dell'acquirente.</li>
</ul>
<h3>💳 Metodi di Pagamento Accettati</h3>
<ul>
    <li>BTC / LTC (0% di commissione)</li>
    <li>Revolut (+10% di commissione)</li>
    <li>PayPal (+10% di commissione)</li>
    <li>Escrow disponibile (+10% di commissione)</li>
</ul>
            `
            // You can add other languages like 'es', 'fr', etc. here...
        }
    };

    function renderProducts() {
        const grid = document.getElementById('products');
        grid.innerHTML = '';
        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${product.image}" alt="${product.name}" class="product-image">
                <h3>${product.name}</h3>
                <label>Weight: </label>
                <select id="weight-${product.id}">
                    ${product.weights.map(w => `<option value="${w}">${w}g</option>`).join('')}
                </select>
                <div class="product-price">€${product.price.toFixed(2)}</div>
                <button class="add-to-cart" onclick="addToCart(${product.id})">Add to Cart</button>
            `;
            grid.appendChild(card);
        });
    }

    function addToCart(productId) {
        const product = products.find(p => p.id === productId);
        const weightSelect = document.getElementById(`weight-${productId}`);
        const selectedWeight = parseInt(weightSelect.value);

        const existingItem = cart.find(item => item.id === productId && item.weight === selectedWeight);
        if (existingItem) {
            existingItem.quantity++;
        } else {
            cart.push({ ...product, weight: selectedWeight, quantity: 1 });
        }
        updateCart();
    }

    function updateCart() {
        document.getElementById('cart-count').innerText = cart.reduce((sum, item) => sum + item.quantity, 0);
        renderCartItems();
    }

    function renderCartItems() {
        const cartItemsContainer = document.getElementById('cart-items');
        cartItemsContainer.innerHTML = '';
        let total = 0;
        cart.forEach((item, index) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            const itemDiv = document.createElement('div');
            itemDiv.className = 'cart-item';
            itemDiv.innerHTML = `
                <div class="cart-item-info">
                    <img src="${item.image}" alt="${item.name}" class="cart-item-image">
                    <div>
                        <div>${item.name} (${item.weight}g)</div>
                        <div>€${item.price.toFixed(2)}</div>
                    </div>
                </div>
                <div class="quantity-control">
                    <button onclick="changeQuantity(${index}, -1)">-</button>
                    <span>${item.quantity}</span>
                    <button onclick="changeQuantity(${index}, 1)">+</button>
                </div>
                <div>€${itemTotal.toFixed(2)}</div>
                <button onclick="removeFromCart(${index})">Remove</button>
            `;
            cartItemsContainer.appendChild(itemDiv);
        });
        document.getElementById('cart-total').innerText = total.toFixed(2);
    }

    function changeQuantity(index, delta) {
        cart[index].quantity += delta;
        if (cart[index].quantity <= 0) {
            cart.splice(index, 1);
        }
        updateCart();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCart();
    }

    function openCart() {
        document.getElementById('cart-modal').style.display = 'block';
    }

    function closeCart() {
        document.getElementById('cart-modal').style.display = 'none';
    }

    function checkout() {
        alert("This is a simulation. For real orders, contact us on Telegram @shadeplug.");
    }

    function changeLanguage() {
        const lang = document.getElementById('lang').value;
        const policyTitle = document.getElementById('policy-title');
        const policyContent = document.getElementById('policy-content');

        if (policy.title[lang]) {
            policyTitle.innerText = policy.title[lang];
        } else {
            policyTitle.innerText = policy.title['en']; // Default to English
        }

        if (policy.content[lang]) {
            policyContent.innerHTML = policy.content[lang];
        } else {
            policyContent.innerHTML = policy.content['en']; // Default to English
        }
    }

    // Initial render
    renderProducts();
    changeLanguage(); // Render English policy on load

</script>

</body>
</html>
