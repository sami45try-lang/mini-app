<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHADE PLUG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-card: #1e1e1e;
            --bg-elevated: #2a2a2a;
            --accent-gold: #d4af37;
            --accent-gold-light: #f4d03f;
            --cannabis-green: #4caf50;
            --cannabis-green-dark: #388e3c;
            --warning-orange: #ff9800;
            --danger-red: #f44336;
            --info-blue: #2196f3;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --shadow-gold: rgba(212, 175, 55, 0.3);
            --shadow-green: rgba(76, 175, 80, 0.2);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 100px;
            overflow-x: hidden;
        }
        
        /* Animated Smoke Background */
        .smoke-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .smoke-particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
            animation: float-up 15s infinite ease-in-out;
        }
        
        .smoke-particle:nth-child(1) { width: 200px; height: 200px; left: 10%; animation-delay: 0s; }
        .smoke-particle:nth-child(2) { width: 150px; height: 150px; left: 30%; animation-delay: 3s; }
        .smoke-particle:nth-child(3) { width: 180px; height: 180px; left: 50%; animation-delay: 6s; }
        .smoke-particle:nth-child(4) { width: 120px; height: 120px; left: 70%; animation-delay: 9s; }
        .smoke-particle:nth-child(5) { width: 160px; height: 160px; left: 85%; animation-delay: 12s; }
        
        @keyframes float-up {
            0%, 100% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.1; }
            50% { transform: translateY(-20vh) scale(1.2); opacity: 0.2; }
        }
        
        .floating-icon {
            position: absolute;
            font-size: 24px;
            opacity: 0.08;
            animation: drift 20s infinite linear;
            filter: blur(1px);
        }
        
        .floating-icon:nth-child(6) { left: 5%; top: 90%; animation-delay: 0s; }
        .floating-icon:nth-child(7) { left: 25%; top: 95%; animation-delay: 4s; }
        .floating-icon:nth-child(8) { left: 45%; top: 85%; animation-delay: 8s; }
        .floating-icon:nth-child(9) { left: 65%; top: 92%; animation-delay: 12s; }
        .floating-icon:nth-child(10) { left: 85%; top: 88%; animation-delay: 16s; }
        
        @keyframes drift {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.08; }
            90% { opacity: 0.05; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        
        /* Header */
        .header {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            padding: 30px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--accent-gold);
        }
        
        .logo-container {
            position: relative;
            display: inline-block;
        }
        
        .logo {
            width: 150px;
            height: 150px;
            object-fit: contain;
            filter: drop-shadow(0 0 30px var(--shadow-gold));
            animation: logo-glow 3s ease-in-out infinite;
        }
        
        @keyframes logo-glow {
            0%, 100% { filter: drop-shadow(0 0 20px var(--shadow-gold)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 40px var(--shadow-gold)); transform: scale(1.02); }
        }
        
        .instagram-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 20px;
            text-decoration: none;
            color: white;
            animation: insta-pulse 2s infinite;
        }
        
        @keyframes insta-pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(225, 48, 108, 0.4); }
            50% { box-shadow: 0 0 25px rgba(225, 48, 108, 0.8); }
        }
        
        .verified-icon {
            background: white;
            color: #e1306c;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }
        
        /* Welcome Section */
        .welcome {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.1) 0%, transparent 100%);
            border-bottom: 1px solid rgba(76, 175, 80, 0.2);
            position: relative;
            z-index: 1;
        }
        
        .welcome h1 {
            font-size: 26px;
            color: var(--accent-gold);
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 0 20px var(--shadow-gold);
        }
        
        .welcome p {
            color: var(--text-secondary);
            font-size: 15px;
        }
        
        .welcome-icon {
            font-size: 40px;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* Category Filter */
        .category-filter {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 25px 20px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            position: relative;
            z-index: 1;
        }
        
        .category-filter::-webkit-scrollbar { display: none; }
        
        .category-btn {
            flex-shrink: 0;
            padding: 14px 28px;
            background: var(--bg-card);
            border: 2px solid transparent;
            border-radius: 30px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .category-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: var(--accent-gold);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            opacity: 0.1;
        }
        
        .category-btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .category-btn.active {
            background: var(--accent-gold);
            color: #000;
            border-color: var(--accent-gold);
            box-shadow: 0 0 30px var(--shadow-gold);
            transform: scale(1.05);
        }
        
        .category-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            transform: translateY(-2px);
        }
        
        .category-btn.active:hover {
            color: #000;
        }
        
        .cat-icon {
            font-size: 18px;
            animation: icon-pulse 2s infinite;
        }
        
        @keyframes icon-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 0 15px 30px;
            position: relative;
            z-index: 1;
        }
        
        @media (min-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
                max-width: 1000px;
                margin: 0 auto;
            }
        }
        
        .product-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
        }
        
        .product-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(212, 175, 55, 0.03) 100%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .product-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--accent-gold);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 30px var(--shadow-gold);
        }
        
        .product-card:hover::after {
            opacity: 1;
        }
        
        .product-image-wrapper {
            position: relative;
            width: 100%;
            height: 170px;
            overflow: hidden;
            background: var(--bg-secondary);
        }
        
        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            pointer-events: none;
            -webkit-user-drag: none;
        }
        
        .product-card:hover .product-image {
            transform: scale(1.1);
        }
        
        .product-badges {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .reship-badge {
            background: var(--cannabis-green);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            animation: badge-pulse 2s infinite;
            box-shadow: 0 2px 10px var(--shadow-green);
        }
        
        @keyframes badge-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 2px 10px var(--shadow-green); }
            50% { transform: scale(1.05); box-shadow: 0 4px 20px var(--shadow-green); }
        }
        
        .origin-badge {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 11px;
            backdrop-filter: blur(10px);
        }
        
        .product-info {
            padding: 18px;
            position: relative;
        }
        
        .product-category {
            font-size: 11px;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .product-name {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }
        
        .product-price {
            color: var(--accent-gold);
            font-size: 20px;
            font-weight: 800;
            display: flex;
            align-items: baseline;
            gap: 5px;
        }
        
        .product-price small {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 400;
        }
        
        .product-shipping {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        /* Product Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            overflow-y: auto;
            backdrop-filter: blur(20px);
        }
        
        .modal-overlay.active { display: block; }
        
        .modal-content {
            background: var(--bg-secondary);
            min-height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            animation: modal-slide-up 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes modal-slide-up {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            z-index: 10;
            color: white;
            transition: all 0.3s;
        }
        
        .modal-close:hover {
            background: var(--danger-red);
            border-color: var(--danger-red);
            transform: rotate(90deg);
        }
        
        .modal-image-section {
            position: relative;
            width: 100%;
            height: 400px;
            background: var(--bg-primary);
            overflow: hidden;
        }
        
        .modal-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }
        
        .image-expand-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid var(--accent-gold);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .image-expand-btn:hover {
            background: var(--accent-gold);
            color: #000;
        }
        
        .modal-body {
            padding: 30px;
        }
        
        .modal-header {
            margin-bottom: 25px;
        }
        
        .modal-title {
            font-size: 28px;
            color: var(--accent-gold);
            font-weight: 800;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .modal-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .meta-tag {
            background: var(--bg-card);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            border: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .meta-tag.reship {
            background: rgba(76, 175, 80, 0.15);
            border-color: var(--cannabis-green);
            color: var(--cannabis-green);
        }
        
        .meta-tag.shipping {
            background: rgba(33, 150, 243, 0.15);
            border-color: var(--info-blue);
            color: var(--info-blue);
        }
        
        .modal-description {
            color: var(--text-secondary);
            margin-bottom: 30px;
            line-height: 1.8;
            font-size: 15px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 15px;
            border-left: 4px solid var(--accent-gold);
        }
        
        .quantity-section {
            margin-bottom: 30px;
        }
        
        .section-label {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .quantity-options {
            display: grid;
            gap: 12px;
        }
        
        .quantity-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 15px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .quantity-option::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background: var(--accent-gold);
            opacity: 0.1;
            transition: width 0.3s;
        }
        
        .quantity-option:hover::before,
        .quantity-option.selected::before {
            width: 100%;
        }
        
        .quantity-option:hover {
            border-color: var(--accent-gold);
            transform: translateX(5px);
        }
        
        .quantity-option.selected {
            border-color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.1);
        }
        
        .qty-info {
            display: flex;
            flex-direction: column;
        }
        
        .qty-amount {
            font-weight: 700;
            font-size: 18px;
            color: var(--text-primary);
        }
        
        .qty-per-unit {
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .qty-price {
            text-align: right;
        }
        
        .qty-total {
            color: var(--accent-gold);
            font-size: 24px;
            font-weight: 800;
        }
        
        .add-to-cart-btn {
            width: 100%;
            padding: 22px;
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-gold-light) 100%);
            color: #000;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 30px var(--shadow-gold);
        }
